name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wiki_updated] # This matches the event_type in Step 2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docusaurus Shell
        uses: actions/checkout@v4

      - name: Pull Latest Docs from Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: docloud-dev/docloud-wiki # The source repo
          path: docs # Dumps files into the Docusaurus /docs folder
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: dev.docloud.lk