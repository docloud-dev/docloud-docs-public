name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [wiki_updated]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docusaurus Shell
        uses: actions/checkout@v4

      - name: Pull Content from Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: docloud-dev/docloud-wiki
          path: temp_content # Pulls the whole wiki repo into this temp folder
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Docs and Blog
        run: |
          # Ensure the target directories exist
          mkdir -p docs
          mkdir -p blog
          
          # Remove default Docusaurus content to prevent duplicates
          rm -rf docs/*
          rm -rf blog/*
          
          # Move files from your wiki repo to Docusaurus folders
          # This assumes your docloud-wiki repo has /docs and /blog folders
          if [ -d "temp_content/docs" ]; then cp -r temp_content/docs/* docs/; fi
          if [ -d "temp_content/blog" ]; then cp -r temp_content/blog/* blog/; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: dev.docloud.lk # Ensuring your custom domain sticks